---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
imagePullSecrets:
- name: devuspacr
---
apiVersion: v1
kind: Pod
metadata:
  name: juiceshop
  labels:
    app.kubernetes.io/name: juiceshop
spec:
  containers:
  - name: juiceshop
    image: bkimminich/juice-shop
    ports:
      - containerPort: 3000
---
kind: Service
apiVersion: v1
metadata:
  name: juiceshop
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: juiceshop
  ports:
  - name: http
    port: 8080
    targetPort: 3000
    nodePort: 30082
---
apiVersion: v1
kind: Service
metadata:
  name: juiceshop-waap-nodeport-access
  labels:
    app.kubernetes.io/instance: juiceshop-usp-core-waap
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: juiceshop-usp-core-waap
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30085
