---
apiVersion: v1
kind: Pod
metadata:
  name: juiceshop
  labels:
    app.kubernetes.io/name: juiceshop
spec:
  containers:
  - name: juiceshop
    image: bkimminich/juice-shop
    ports:
      - containerPort: 3000
---
kind: Service
apiVersion: v1
metadata:
  name: juiceshop
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: juiceshop
  ports:
  - name: http
    port: 8080
    targetPort: 3000
    nodePort: 30082
